[pytest]
# Configuración de pytest para el Dashboard de Ventas

# Directorio de tests
testpaths = tests

# Patrones de archivos de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers personalizados
markers =
    unit: Tests unitarios con mocks
    integration: Tests de integración
    slow: Tests que toman más tiempo

# Coverage (si se instala pytest-cov)
# addopts = --cov=src --cov-report=html --cov-report=term

# Directorio de caché
cache_dir = .pytest_cache

# Ignorar warnings específicos
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
